name: Sync project docs

# Fires the Google Apps Script doc-sync within seconds of site-content.json
# changing on main (e.g. an admin-mode "Save to GitHub" commit). The script
# itself only rewrites a doc when its content changed, so this is safe to fire
# on every relevant push.

on:
  push:
    branches: [main]
    paths:
      - 'src/content/site-content.json'
  workflow_dispatch: {}   # allow manual run from the Actions tab

# Don't pile up runs if several commits land quickly.
concurrency:
  group: sync-docs
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call Apps Script web app
        env:
          URL: ${{ secrets.APPS_SCRIPT_URL }}
          SECRET: ${{ secrets.SYNC_SECRET }}
        run: |
          if [ -z "$URL" ] || [ -z "$SECRET" ]; then
            echo "::error::Missing APPS_SCRIPT_URL and/or SYNC_SECRET repo secret."
            exit 1
          fi
          # IMPORTANT: do NOT use `-X POST` here. Apps Script answers /exec with
          # a 302 to a googleusercontent result URL that only accepts GET; `-X
          # POST` would force POST onto that redirect and return 405. Using
          # `--data-urlencode` makes just the first request a POST (running
          # doPost), then curl follows the 302 as a normal GET to read the JSON.
          code=$(curl -sS -L -o response.txt -w '%{http_code}' \
                      --data-urlencode "secret=$SECRET" \
                      --max-time 120 "$URL")
          echo "HTTP status: $code"
          echo "Response body:"
          cat response.txt 2>/dev/null || true
          echo
          if grep -q '"ok":true' response.txt 2>/dev/null; then
            echo "Docs sync OK."
            exit 0
          fi
          # Order matters: the specific Apps Script error pages are HTML too, so
          # check for them BEFORE the generic HTML/sign-in catch-all.
          if grep -qi 'function not found' response.txt 2>/dev/null; then
            echo "::error::Apps Script: function not found (likely doPost). The live deployment is an OLD version — Deploy -> Manage deployments -> edit -> Version: New version -> Deploy."
          elif grep -qi 'unauthorized' response.txt 2>/dev/null; then
            echo "::error::Web app returned 'unauthorized' — SYNC_SECRET must equal the WEBHOOK_SECRET script property."
          elif grep -qiE 'accounts\.google\.com|sign in to continue|ServiceLogin' response.txt 2>/dev/null; then
            echo "::error::Got a Google sign-in page — the URL is not a public /exec deployment (wrong URL or access not 'Anyone')."
          elif grep -qiE '<!DOCTYPE|<html' response.txt 2>/dev/null; then
            echo "::error::Got HTML, not JSON (see body above) — usually a stale deployment missing doPost, or the wrong URL."
          else
            echo "::error::Sync did not return ok:true (see body above)."
          fi
          exit 1
